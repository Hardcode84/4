repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.6
    hooks:
      - id: clang-format
        types_or: [c, c++]
        exclude: ixsimpl_amalg\.c

  - repo: https://github.com/fsfe/reuse-tool
    rev: v5.1.1
    hooks:
      - id: reuse
        exclude: '\.md$'

# Sort file and library lists in CMake files.
  -   repo: https://github.com/Hardcode84/3
      rev: v0.3.0
      hooks:
      -   id: sort-cmake-lists

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [hypothesis, sympy]
        args: [--strict]

  - repo: local
    hooks:
      - id: amalgamate
        name: regenerate ixsimpl_amalg.c
        language: python
        entry: python scripts/amalgamate.py
        files: ^src/.*\.c$
        pass_filenames: false
